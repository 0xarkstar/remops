version: 2

project_name: remops

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: 0xarkstar
      name: homebrew-tap
    homepage: "https://github.com/0xarkstar/remops"
    description: "Manage your servers from terminal, Claude Code, or Telegram — through one security pipeline"
    license: "Apache-2.0"
    install: |
      bin.install "remops"
    test: |
      system "#{bin}/remops", "--version"
