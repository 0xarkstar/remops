version: 1

hosts:
  prod:
    address: 100.91.194.29
    user: arkstar
    description: "M4 Mac Mini — production services"
    tags: [production, tailscale]
    timeout: 5s
  dev:
    address: 100.122.101.91
    user: arkstar
    description: "M4 Mac Mini — development"
    tags: [development, tailscale]
    timeout: 5s

services:
  crawl4ai:
    host: prod
    container: crawl4ai
    tags: [crawler]
  searxng:
    host: prod
    container: searxng
    tags: [search]
  beszel:
    host: prod
    container: beszel
    tags: [monitoring]
  uptime-kuma:
    host: prod
    container: uptime-kuma
    tags: [monitoring]

profiles:
  viewer:
    level: viewer
  operator:
    level: operator
    require_dry_run: true
    approval: out-of-band
  admin:
    level: admin

approval:
  method: telegram
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
  timeout: 5m
  rate_limit:
    max_writes_per_host_per_hour: 5
